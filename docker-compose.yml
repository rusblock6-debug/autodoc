# AutoDoc AI System - Docker Compose Configuration
# =================================================
#
# Services included:
# - autodoc-ai: FastAPI backend
# - autodoc-frontend: React frontend
# - postgres: Database
# - redis: Task queue
# - celery-worker: Background processing
# - pgadmin: Database management (optional)
#
# Access URLs:
# - Frontend: http://localhost:3000
# - Backend API: http://localhost:8000
# - API Docs: http://localhost:8000/docs
# - pgAdmin: http://localhost:5050
# =================================================

services:
  # === Main Application ===
  autodoc-ai:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: autodoc-ai
    env_file:
      - .env
    ports:
      - "${API_PORT:-8888}:8000"
    volumes:
      - ./:/workspace/autodoc_ai
      - ./data:/data
      - chatterbox_cache:/root/.cache/huggingface
    environment:
      - DATABASE_HOST=postgres
      - REDIS_HOST=redis
    depends_on:
      - postgres
      - redis
    networks:
      - autodoc-network
    restart: unless-stopped

  # === Frontend Application ===
  autodoc-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: autodoc-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://autodoc-ai:8000
      - NODE_ENV=development
    networks:
      - autodoc-network
    restart: unless-stopped
    depends_on:
      - autodoc-ai

  # === PostgreSQL Database ===
  postgres:
    image: postgres:15-alpine
    container_name: autodoc-postgres
    environment:
      - POSTGRES_USER=autodoc
      - POSTGRES_PASSWORD=autodoc_secret
      - POSTGRES_DB=autodoc_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - autodoc-network
    restart: unless-stopped

  # === Redis for Task Queue ===
  redis:
    image: redis:7-alpine
    container_name: autodoc-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    # ports:
    #   - "6390:6379"
    networks:
      - autodoc-network
    restart: unless-stopped

  # === Celery Worker (for background tasks) ===
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: autodoc-celery
    env_file:
      - .env
    command: celery -A app.celery worker --loglevel=info
    volumes:
      - ./:/workspace/autodoc_ai
      - ./data:/data
      - chatterbox_cache:/root/.cache/huggingface
    environment:
      - DATABASE_HOST=postgres
      - REDIS_HOST=redis
    depends_on:
      - postgres
      - redis
    networks:
      - autodoc-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.celery inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  autodoc-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  chatterbox_cache:
