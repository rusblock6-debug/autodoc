# AutoDoc AI System - Docker Compose Configuration
# =================================================
#
# Services included:
# - autodoc-ai: FastAPI backend
# - autodoc-frontend: React frontend
# - postgres: Database
# - redis: Task queue
# - celery-worker: Background processing
# - pgadmin: Database management (optional)
#
# Access URLs:
# - Frontend: http://localhost:3000
# - Backend API: http://localhost:8000
# - API Docs: http://localhost:8000/docs
# - pgAdmin: http://localhost:5050
# =================================================

services:
  # === Main Application ===
  autodoc-ai:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: autodoc-ai
    env_file:
      - .env
    ports:
      - "${API_PORT:-8888}:8000"
    volumes:
      - ./:/workspace/autodoc_ai
      - ./data:/data
      - chatterbox_cache:/root/.cache/huggingface
    environment:
      - DATABASE_HOST=postgres
      - REDIS_HOST=redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    networks:
      - autodoc-network
    restart: unless-stopped

  # === Frontend Application ===
  autodoc-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: autodoc-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://autodoc-ai:8000
      - NODE_ENV=development
    networks:
      - autodoc-network
    restart: unless-stopped
    depends_on:
      - autodoc-ai

  # === PostgreSQL Database ===
  postgres:
    image: postgres:15-alpine
    container_name: autodoc-postgres
    environment:
      - POSTGRES_USER=autodoc
      - POSTGRES_PASSWORD=autodoc_secret
      - POSTGRES_DB=autodoc_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    networks:
      - autodoc-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autodoc -d autodoc_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # === Redis for Task Queue ===
  redis:
    image: redis:7-alpine
    container_name: autodoc-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    # ports:
    #   - "6390:6379"
    networks:
      - autodoc-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # === Ollama (local LLM / Vision backend) ===
  # Запускается ВНУТРИ стека, чтобы "улучшить шаг" работало из коробки
  # без ручного старта ollama на хосте. Модель тянет сервис ollama-init.
  ollama:
    image: ollama/ollama:latest
    container_name: autodoc-ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    volumes:
      - ollama_models:/root/.ollama
    networks:
      - autodoc-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # === Ollama model pull (one-shot) ===
  # Один раз при первом запуске скачивает модели в volume ollama_models:
  #   - qwen2.5:3b    — текстовая, для режима "улучшить" (быстро, на GPU)
  #   - qwen2.5vl:3b  — vision, для режима "regenerate" по скриншоту
  # Требует интернет только при первом `up`; дальше берётся из кэша.
  ollama-init:
    image: ollama/ollama:latest
    container_name: autodoc-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=ollama:11434
    entrypoint: ["/bin/sh", "-c", "ollama pull qwen2.5:3b && ollama pull qwen2.5vl:3b"]
    networks:
      - autodoc-network
    restart: "no"

  # === Celery Worker (for background tasks) ===
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: autodoc-celery
    env_file:
      - .env
    command: celery -A app.celery worker --loglevel=info
    volumes:
      - ./:/workspace/autodoc_ai
      - ./data:/data
      - chatterbox_cache:/root/.cache/huggingface
    environment:
      - DATABASE_HOST=postgres
      - REDIS_HOST=redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    networks:
      - autodoc-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.celery inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  autodoc-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  chatterbox_cache:
  ollama_models:
