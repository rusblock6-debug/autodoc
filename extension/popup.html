<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>НИР-Документ</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand: #ed8d48;
            --brand-dark: #dc7a37;
            --brand-soft: #fef6ef;
            --rec: #ef4444;
            --ok: #10b981;
            --ok-dark: #059669;
            --ink: #1f2937;
            --muted: #6b7280;
            --faint: #9ca3af;
            --line: #ececec;
            --bg: #f7f7f8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            width: 340px;
            font-family: 'Roboto', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--ink);
            -webkit-font-smoothing: antialiased;
        }

        /* ---------- Header ---------- */
        .header {
            background: #fff;
            padding: 13px 16px;
            border-bottom: 1px solid var(--line);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header-icon {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, var(--brand) 0%, var(--brand-dark) 100%);
            border-radius: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 6px rgba(237, 141, 72, 0.35);
        }
        .header-icon span {
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 10px;
            letter-spacing: 0.5px;
        }
        .header h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 13px;
            font-weight: 600;
            color: var(--ink);
        }
        .settings-btn {
            margin-left: auto;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            background: transparent;
            cursor: pointer;
            color: var(--faint);
            border-radius: 7px;
            transition: all 0.15s;
        }
        .settings-btn:hover { background: #f0f0f0; color: var(--ink); }
        .settings-btn svg { width: 17px; height: 17px; }

        /* ---------- Content ---------- */
        .content { padding: 14px 16px 16px; }

        .session-name input {
            width: 100%;
            padding: 10px 12px;
            font-family: 'Roboto', sans-serif;
            font-size: 13px;
            color: var(--ink);
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            outline: none;
            transition: all 0.18s;
        }
        .session-name input:focus {
            border-color: var(--brand);
            box-shadow: 0 0 0 3px rgba(237, 141, 72, 0.12);
        }
        .session-name input::placeholder { color: var(--faint); }

        /* ---------- Status card ---------- */
        .status-card {
            margin-top: 12px;
            background: #fff;
            border: 1px solid var(--line);
            border-radius: 10px;
            overflow: hidden;
        }
        .status-head {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 11px 14px;
            border-bottom: 1px solid var(--line);
        }
        .status-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: var(--faint);
            flex-shrink: 0;
            transition: background 0.2s;
        }
        .status-value {
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            font-size: 12.5px;
            color: var(--ink);
        }
        /* Recording state: red pulsing dot */
        .status-value.recording { color: var(--rec); }
        .status-head:has(.status-value.recording) .status-dot {
            background: var(--rec);
            box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.6);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%   { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.55); }
            70%  { box-shadow: 0 0 0 7px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
        }
        .stat {
            padding: 12px 14px;
            text-align: center;
        }
        .stat + .stat { border-left: 1px solid var(--line); }
        .stat-value {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 20px;
            color: var(--ink);
            font-variant-numeric: tabular-nums;
            line-height: 1.1;
        }
        .stat-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: var(--faint);
            margin-top: 3px;
        }

        /* ---------- Buttons ---------- */
        .btn {
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.15s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
        }
        .btn:active:not(:disabled) { transform: scale(0.98); }
        .btn svg { width: 16px; height: 16px; }

        .btn-primary {
            width: 100%;
            margin-top: 12px;
            padding: 12px;
            font-size: 13px;
            background: var(--brand);
            color: #fff;
            box-shadow: 0 2px 8px rgba(237, 141, 72, 0.3);
        }
        .btn-primary:hover:not(:disabled) { background: var(--brand-dark); }
        .btn-primary:disabled { background: #e5e5e5; color: var(--faint); cursor: not-allowed; box-shadow: none; }
        .rec-dot { width: 9px; height: 9px; border-radius: 50%; background: #fff; }

        /* Toolbar (during recording) */
        .toolbar {
            display: flex;
            gap: 7px;
            align-items: center;
            margin-top: 12px;
        }
        .toolbar.hidden { display: none; }

        .btn-done {
            flex: 1;
            padding: 11px;
            font-size: 13px;
            background: var(--ok);
            color: #fff;
            box-shadow: 0 2px 8px rgba(16, 185, 129, 0.3);
        }
        .btn-done:hover:not(:disabled) { background: var(--ok-dark); }
        .btn-done:disabled { background: #d8dcd9; color: #fff; cursor: not-allowed; box-shadow: none; }

        .btn-icon {
            width: 40px;
            height: 40px;
            padding: 0;
            flex-shrink: 0;
            background: #fff;
            color: var(--muted);
            border: 1px solid #e0e0e0;
            border-radius: 8px;
        }
        .btn-icon:hover:not(:disabled) { border-color: var(--brand); color: var(--brand); background: var(--brand-soft); }
        .btn-icon:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-icon.btn-delete:hover:not(:disabled) { border-color: var(--rec); color: var(--rec); background: #fef2f2; }

        /* Pause/play icon swap */
        #pauseBtn .ic-play { display: none; }
        #pauseBtn.is-paused .ic-pause { display: none; }
        #pauseBtn.is-paused .ic-play { display: block; }

        /* Secondary action */
        .action-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            margin-top: 12px;
            padding: 11px 13px;
            font-family: 'Roboto', sans-serif;
            font-size: 13px;
            color: var(--ink);
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.18s;
        }
        .action-btn:hover { border-color: var(--brand); background: var(--brand-soft); }
        .action-btn .chevron { margin-left: auto; color: var(--faint); }
        .action-btn:hover .chevron { color: var(--brand); }
        .action-btn svg { width: 17px; height: 17px; flex-shrink: 0; }

        /* ---------- Settings panel ---------- */
        .settings-panel {
            margin-top: 12px;
            padding: 13px;
            border: 1px solid var(--line);
            border-radius: 10px;
            background: #fff;
        }
        .settings-panel.hidden { display: none; }
        .settings-panel label {
            display: block;
            font-family: 'Montserrat', sans-serif;
            font-size: 11px;
            color: var(--muted);
            margin-bottom: 7px;
            font-weight: 600;
        }
        .settings-panel input {
            width: 100%;
            padding: 9px 11px;
            font-family: 'Roboto', sans-serif;
            font-size: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 7px;
            outline: none;
            transition: all 0.18s;
        }
        .settings-panel input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(237, 141, 72, 0.12); }
        .settings-row { display: flex; gap: 8px; margin-top: 9px; align-items: center; }
        .settings-save {
            background: var(--brand);
            color: #fff;
            border: none;
            border-radius: 7px;
            padding: 9px 15px;
            font-family: 'Montserrat', sans-serif;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.15s;
        }
        .settings-save:hover { background: var(--brand-dark); }
        .settings-hint { font-size: 11px; color: var(--ok); margin: 0; }
        .settings-hint.error { color: var(--rec); }
        .settings-help { font-size: 10.5px; color: var(--faint); margin-top: 8px; line-height: 1.45; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-icon"><span>НД</span></div>
        <h1>НИР-Документ</h1>
        <button class="settings-btn" id="settingsBtn" title="Настройки сервера" aria-label="Настройки">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
            </svg>
        </button>
    </div>

    <div class="content">
        <div class="session-name">
            <input type="text" id="sessionName" placeholder="Название руководства…">
        </div>

        <div class="status-card">
            <div class="status-head">
                <span class="status-dot"></span>
                <span id="status" class="status-value">Готов</span>
            </div>
            <div class="stats">
                <div class="stat">
                    <div class="stat-value" id="duration">00:00</div>
                    <div class="stat-label">Время</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="clickCount">0</div>
                    <div class="stat-label">Кликов</div>
                </div>
            </div>
        </div>

        <button class="btn btn-primary" id="startBtn">
            <span class="rec-dot"></span>
            Начать запись
        </button>

        <div class="toolbar hidden" id="toolbar">
            <button class="btn btn-done" id="stopBtn" title="Завершить запись">Готово</button>
            <button class="btn btn-icon btn-pause" id="pauseBtn" title="Пауза" aria-label="Пауза">
                <svg class="ic-pause" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1"></rect><rect x="14" y="5" width="4" height="14" rx="1"></rect></svg>
                <svg class="ic-play" viewBox="0 0 24 24" fill="currentColor"><polygon points="6 4 20 12 6 20 6 4"></polygon></svg>
            </button>
            <button class="btn btn-icon btn-undo" id="undoBtn" title="Отменить последний клик" aria-label="Отменить">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 14 4 9 9 4"></polyline><path d="M20 20v-7a4 4 0 0 0-4-4H4"></path></svg>
            </button>
            <button class="btn btn-icon btn-delete" id="cancelBtn" title="Удалить запись" aria-label="Удалить">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
            </button>
        </div>

        <button class="action-btn" id="viewGuidesBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"></rect><rect x="14" y="3" width="7" height="7" rx="1"></rect><rect x="3" y="14" width="7" height="7" rx="1"></rect><rect x="14" y="14" width="7" height="7" rx="1"></rect></svg>
            <span>Все руководства</span>
            <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:15px;height:15px;"><polyline points="9 18 15 12 9 6"></polyline></svg>
        </button>

        <div class="settings-panel hidden" id="settingsPanel">
            <label for="serverUrl">Адрес сервера</label>
            <input type="text" id="serverUrl" placeholder="https://autodoc.company.com">
            <div class="settings-row">
                <button class="settings-save" id="saveServerBtn">Сохранить</button>
                <p class="settings-hint" id="settingsHint"></p>
            </div>
            <p class="settings-help">Куда расширение отправляет записи. Пусто — локальный сервер (localhost).</p>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
