<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>НИР-Документ</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            width: 300px;
            font-family: 'Roboto', sans-serif;
            background: #fff;
            color: #333;
        }
        
        .header {
            background: #fff;
            padding: 16px 20px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .header-icon {
            width: 28px;
            height: 28px;
            background: #ed8d48;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .header-icon span {
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 10px;
        }
        
        .header h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            font-weight: 600;
            color: #333;
        }
        
        .content {
            padding: 18px 20px;
        }
        
        .status-panel {
            background: #fafafa;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            padding: 12px 16px;
            margin-bottom: 16px;
        }
        
        .status-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
        }
        
        .status-item:not(:last-child) {
            border-bottom: 1px solid #eee;
        }
        
        .status-label {
            font-size: 12px;
            color: #666;
        }
        
        .status-value {
            font-family: 'Montserrat', sans-serif;
            font-size: 12px;
            font-weight: 600;
            color: #333;
        }
        
        .status-value.recording {
            color: #ed8d48;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .session-name {
            margin-bottom: 16px;
        }
        
        .session-name label {
            display: block;
            font-family: 'Montserrat', sans-serif;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            color: #666;
            margin-bottom: 6px;
        }
        
        .session-name input {
            width: 100%;
            padding: 10px 12px;
            font-family: 'Roboto', sans-serif;
            font-size: 13px;
            color: #333;
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            outline: none;
            transition: border-color 0.2s;
        }
        
        .session-name input:focus {
            border-color: #ed8d48;
        }
        
        .session-name input::placeholder {
            color: #999;
        }
        
        .control-buttons {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        
        .btn {
            flex: 1;
            padding: 10px 14px;
            font-family: 'Montserrat', sans-serif;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        
        .btn:hover {
            opacity: 0.9;
        }
        
        .btn:active {
            transform: scale(0.98);
        }
        
        .btn-primary {
            background: #ed8d48;
            color: #fff;
        }
        
        .btn-primary:hover {
            background: #e67e38;
        }
        
        .btn-primary:disabled {
            background: #e0e0e0;
            color: #999;
            cursor: not-allowed;
            opacity: 1;
        }
        
        .btn-stop {
            background: #dc3545;
            color: #fff;
            font-size: 16px;
            padding: 10px;
        }
        
        .btn-stop:hover:not(:disabled) {
            background: #c82333;
        }
        
        .btn-stop:disabled {
            background: #e0e0e0 !important;
            color: #999 !important;
            cursor: not-allowed !important;
        }
        
        .btn-pause {
            background: #ffc107;
            color: #333;
        }
        
        .btn-pause:hover {
            background: #ffb300;
        }
        
        .btn-cancel {
            background: #6c757d;
            color: #fff;
            font-size: 16px;
            padding: 10px;
        }
        
        .btn-cancel:hover {
            background: #5a6268;
        }
        
        .btn-icon {
            padding: 10px;
            min-width: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex: 0 0 auto;
        }
        
        .btn-icon.btn-undo {
            background: #17a2b8;
            color: #fff;
        }
        
        .btn-icon.btn-undo:hover {
            background: #138496;
        }
        
        .btn-icon.btn-mic {
            background: #28a745;
            color: #fff;
        }
        
        .btn-icon.btn-mic:hover {
            background: #218838;
        }
        
        .btn:disabled {
            background: #e0e0e0 !important;
            color: #999 !important;
            cursor: not-allowed !important;
            opacity: 1 !important;
            transform: none !important;
        }
        
        .recording-controls {
            display: none;
            gap: 8px;
            margin-bottom: 12px;
        }
        
        .recording-controls.active {
            display: flex;
        }
        
        .action-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            padding: 12px 16px;
            font-family: 'Roboto', sans-serif;
            font-size: 13px;
            color: #333;
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .action-btn:hover {
            border-color: #ed8d48;
            background: #fff8f4;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-icon"><span>НД</span></div>
        <h1>НИР-Документ</h1>
    </div>
    
    <div class="content">
        <div class="status-panel">
            <div class="status-item">
                <span class="status-label">Статус</span>
                <span class="status-value" id="status">Готов</span>
            </div>
            <div class="status-item">
                <span class="status-label">Время</span>
                <span class="status-value" id="duration">00:00</span>
            </div>
            <div class="status-item">
                <span class="status-label">Кликов</span>
                <span class="status-value" id="clickCount">0</span>
            </div>
        </div>
        
        <div class="session-name">
            <label for="sessionName">Название руководства</label>
            <input type="text" id="sessionName" placeholder="Например: Как создать документ">
        </div>
        
        <div class="control-buttons">
            <button class="btn btn-primary" id="startBtn">Начать запись</button>
        </div>
        
        <div class="recording-controls" id="recordingControls">
            <button class="btn btn-pause" id="pauseBtn">⏸ Пауза</button>
            <button class="btn btn-stop btn-icon" id="stopBtn" title="Остановить запись">⏹</button>
        </div>
        
        <div class="recording-controls" id="recordingControls2">
            <button class="btn btn-icon btn-undo" id="undoBtn" title="Удалить последний клик">↶</button>
            <button class="btn btn-icon btn-mic" id="micBtn" title="Голосовые заметки (скоро)">🎤</button>
            <button class="btn btn-cancel btn-icon" id="cancelBtn" title="Отменить запись">✕</button>
        </div>
        
        <button class="action-btn" id="viewGuidesBtn">
            <span>📋</span>
            <span>Все руководства</span>
        </button>
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
