<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>НИР-Документ</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            width: 340px;
            font-family: 'Roboto', sans-serif;
            background: #fff;
            color: #333;
        }
        
        .header {
            background: #fff;
            padding: 14px 16px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .header-icon {
            width: 26px;
            height: 26px;
            background: #ed8d48;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .header-icon span {
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 9px;
        }
        
        .header h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 13px;
            font-weight: 600;
            color: #333;
        }
        
        .content {
            padding: 14px 16px;
        }
        
        .session-name {
            margin-bottom: 12px;
        }
        
        .session-name input {
            width: 100%;
            padding: 9px 11px;
            font-family: 'Roboto', sans-serif;
            font-size: 13px;
            color: #333;
            background: #fff;
            border: 1px solid #d0d0d0;
            border-radius: 4px;
            outline: none;
            transition: border-color 0.2s;
        }
        
        .session-name input:focus {
            border-color: #ed8d48;
        }
        
        .session-name input::placeholder {
            color: #999;
        }
        
        .status-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0;
            margin-bottom: 10px;
            font-size: 12px;
            color: #666;
        }
        
        .status-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .status-value {
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            color: #333;
        }
        
        .status-value.recording {
            color: #ed8d48;
        }
        
        .toolbar {
            display: flex;
            gap: 6px;
            align-items: center;
            justify-content: center;
            padding: 10px 0;
            border-top: 1px solid #e8e8e8;
            border-bottom: 1px solid #e8e8e8;
            margin-bottom: 12px;
        }
        
        .toolbar.hidden {
            display: none;
        }
        
        .btn {
            padding: 8px 16px;
            font-family: 'Roboto', sans-serif;
            font-size: 12px;
            font-weight: 500;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.15s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .btn:hover:not(:disabled) {
            opacity: 0.85;
        }
        
        .btn:active:not(:disabled) {
            transform: scale(0.97);
        }
        
        .btn-primary {
            background: #ed8d48;
            color: #fff;
            width: 100%;
            justify-content: center;
            padding: 10px;
        }
        
        .btn-primary:disabled {
            background: #e0e0e0;
            color: #999;
            cursor: not-allowed;
        }
        
        .btn-icon {
            width: 36px;
            height: 36px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            border-radius: 6px;
            flex-shrink: 0;
        }
        
        .btn-done {
            background: #28a745;
            color: #fff;
            padding: 8px 14px;
            font-weight: 600;
        }
        
        .btn-done:hover:not(:disabled) {
            background: #218838;
        }
        
        .btn-done:disabled {
            background: #d0d0d0;
            color: #999;
            cursor: not-allowed;
        }
        
        .btn-pause {
            background: #f5f5f5;
            color: #333;
            border: 1px solid #d0d0d0;
        }
        
        .btn-pause:hover:not(:disabled) {
            background: #e8e8e8;
        }
        
        .btn-undo {
            background: #f5f5f5;
            color: #333;
            border: 1px solid #d0d0d0;
        }
        
        .btn-undo:hover:not(:disabled) {
            background: #e8e8e8;
        }
        
        .btn-undo:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        
        .btn-delete {
            background: #f5f5f5;
            color: #dc3545;
            border: 1px solid #d0d0d0;
        }
        
        .btn-delete:hover:not(:disabled) {
            background: #ffe8e8;
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .action-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            padding: 10px 12px;
            font-family: 'Roboto', sans-serif;
            font-size: 13px;
            color: #333;
            background: #fff;
            border: 1px solid #d0d0d0;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .action-btn:hover {
            border-color: #ed8d48;
            background: #fff8f4;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-icon"><span>НД</span></div>
        <h1>НИР-Документ</h1>
    </div>
    
    <div class="content">
        <div class="session-name">
            <input type="text" id="sessionName" placeholder="Название руководства...">
        </div>
        
        <div class="status-bar">
            <div class="status-left">
                <span id="status" class="status-value">Готов</span>
                <span>•</span>
                <span id="duration">00:00</span>
                <span>•</span>
                <span><span id="clickCount">0</span> кликов</span>
            </div>
        </div>
        
        <button class="btn btn-primary" id="startBtn">Начать запись</button>
        
        <div class="toolbar hidden" id="toolbar">
            <button class="btn btn-done" id="stopBtn" title="Завершить запись">✓ Готово</button>
            <button class="btn btn-icon btn-pause" id="pauseBtn" title="Пауза">⏸</button>
            <button class="btn btn-icon btn-undo" id="undoBtn" title="Отменить последний клик">↶</button>
            <button class="btn btn-icon btn-delete" id="cancelBtn" title="Удалить запись">🗑</button>
        </div>
        
        <button class="action-btn" id="viewGuidesBtn">
            <span>📋</span>
            <span>Все руководства</span>
        </button>
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
